@if(label()){
   <label [for]="elID">
      {{label()}}
      @if(required()){
         <span>*</span>
      }
   </label>
}
<dropdown-input #search="cdkOverlayOrigin" cdkOverlayOrigin/>

<popup [origin]="search">
   <dropwdown-table class="popup-style">
      <ng-container head>
         <ng-content select="[head]"/>
      </ng-container>
      <ng-template #row let-item>
         <ng-container [ngTemplateOutlet]="trContent()" [ngTemplateOutletContext]="{$implicit:item}"/>
      </ng-template>
   </dropwdown-table>
</popup>
