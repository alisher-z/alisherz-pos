@if(label()){
    <label [for]="id()">
        {{label()}}
        @if(required()){
            <span>*</span>
        }
    </label>
}
<div>
    <ng-content/>
    @if(errors().length > 0 && touched()){
        <input-error [origin]="origin" [errors]="errors()"/>
        <aside 
            cdkOverlayOrigin
            #origin="cdkOverlayOrigin"
        ></aside>
    }
</div>
