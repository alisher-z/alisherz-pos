<header>
   <ibutton icon="chevronLeft" tab="-1" size="1.3" (bclick)="arrowleft()"/>
   <button
   cdkOverlayOrigin
   #origin="cdkOverlayOrigin"
   (click)="click($event)"
   (keydown.arrowdown)="arrowdown()"
   (keydown.arrowup)="arrowup()"
   (keydown.arrowright)="arrowright()"
   (keydown.arrowleft)="arrowleft()"
   (keydown.enter)="enter()"
   (keydown.escape)="escape()"
   > {{_items[index()]}}
   </button>
   <ibutton icon="chevronRight" tab="-1" size="1.3" (bclick)="arrowright()"/>
</header>
<popup [origin]="origin">
   <main class="popup-style">
      @for(item of _items; track item){
         <button #scroll tabindex="-1" [class.active]="$index===index()" (click)="itemClick($index)">
            {{item}}
         </button>
      }
   </main>
</popup>
