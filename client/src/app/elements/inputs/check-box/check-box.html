<div class="input-field">
    @if(label()){
        <label [for]="id">{{label()}}</label>
    }
    <input 
        el-exposer
        type="checkbox"
        [id]="id"
        [checked]="checked()"
        [indeterminate]="indeterminate"
        [disabled]="disabled()"
        (change)="change()"
        (element)="self.emit($event)">
</div>
