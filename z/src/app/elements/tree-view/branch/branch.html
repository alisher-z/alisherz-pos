<details open>
    <summary>
        <icon iname="keyboard_double_arrow_right" size="2" />
        <span>{{branch()}}</span>
    </summary>
    <ul>
        @for(branch of leaves(); track branch.label){
            @if(branch.children){
                <li class="branch" (click)="click(branch.field)">
                    <tree-view-branch 
                    [branch]="branch.label" 
                    [leaves]="branch.children" 
                    />
                </li>
            }

            @else{
                <li class="leaf" (click)="click(branch.field)">
                    <icon iname="last_page" size="1.7" />
                    <span>{{branch.label}}</span>
                </li>
            }
        }
    </ul>
</details>
