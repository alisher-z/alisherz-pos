<ul (click)="parentClick()">
    @for(branch of tree(); track branch.label){
        @if(branch.children){
            <li class="branch" (click)="bridge.click(branch.field)">
                <tree-view-branch 
                [branch]="branch.label" 
                [leaves]="branch.children!"
                />
            </li>
        }

        @else{
            <li class="leaf" (click)="click(branch.field!)">
                <icon iname="last_page" size="1.7"/>
                <span>{{branch.label}}</span>
            </li>
        }
    }
</ul>
