@if(label()){<label [for]="id">{{label()}}</label>}

<section [class.input]="columns()<1">
  @if(columns()>0){
    <aside>
      @for(p of value(); track p){
        <ng-container *ngTemplateOutlet="param; context:{p, $index}"/>
      }
    </aside>
  }
  
  <input 
  type="text" 
  [id]="id" 
  (blur)="blur($event)"
  (keydown)="keydown($event)"
  (keydown.tab)="onTab($event)" 
  (keydown.enter)="onEnter($event)"
  />
</section>

<ng-template #param let-param="p" let-index="$index">
  <div [title]="param">
    <span>{{param}}</span>
    <ibutton iname="close" size="2" (tapdown)="tapdown(index, $event)"/>
  </div>
</ng-template>
